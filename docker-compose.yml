services:
  netinv:
    build: ./server
    image: netinv-server:latest
    container_name: netinv
    restart: unless-stopped
    ports:
      - "${NETINV_PORT:-8080}:8080"
    volumes:
      - ./data:/data
    environment:
      - NETINV_DB=/data/netinv.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/api/health',timeout=2).status==200 else 1)"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
